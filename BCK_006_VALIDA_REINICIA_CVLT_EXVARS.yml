---
- hosts: "{{ HOST }}"
  gather_facts: no
  tasks:
  - name: Fecha y Hora
    command: date
    register: fecha
  - debug: 
      msg: "FECHA: {{ fecha.stdout }}"
      
  - name: Nombre Host
    command: hostname
    register: hostname
  - debug: 
      msg: "NOMBRE DEL HOST: {{ hostname.stdout }}"
      
  - name: Salida del Comando Ejecutado
    command: "{{ COMANDO }}"
    register: resultado
  - debug: var=resultado.stdout_lines
