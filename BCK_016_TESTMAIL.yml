---
- hosts: all
  gather_facts: no

  tasks:
    - name: Nombre Host
      command: hostname
      register: hostname
    - debug:
        msg: "HOSTNAME: {{ hostname.stdout }}"

    - name: Direcciones IP
      command: ip a
      register: ip
    - debug: var=ip.stdout_lines
  
    - name: Enviar Correo vía Python
      shell: |
        python3 - << 'EOF'
        import smtplib
        from email.message import EmailMessage
        import os
        import sys

        smtp_server = "172.22.88.6"
        smtp_port = 25

        file_path = "/tmp/reportes/Reporte_MEM.html"

        try:
            print(f"Validando archivo: {file_path}")

            if not os.path.exists(file_path):
                raise Exception(f"No existe el archivo: {file_path}")

            msg = EmailMessage()
            msg["Subject"] = "Prueba Reporte Ejecución Comando"
            msg["From"] = "ansible@claro.com.co"
            msg["To"] = "gustavo.lamprea@claro.com.co"

            msg.set_content(
                "Buen día,\n\n"
                "Se adjunta el reporte de la ejecución realizada por la automatización.\n\n"
                "Saludos,\n\nAutomatización Backup DC"
            )

            with open(file_path, "rb") as f:
                msg.add_attachment(
                    f.read(),
                    maintype="text",
                    subtype="html",
                    filename=os.path.basename(file_path)
                )

            with smtplib.SMTP(smtp_server, smtp_port, timeout=10) as server:
                server.send_message(msg)

            print("Correo enviado correctamente")

        except Exception as e:
            print(f"Error enviando correo: {e}")
            sys.exit(1)
        EOF
      run_once: true
