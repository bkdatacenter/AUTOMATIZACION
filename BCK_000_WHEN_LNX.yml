---
- hosts: "{{ HOST }}"
  gather_facts: no

  vars:
    comandos: "{{ COMANDO }}"
    lista_comandos:
      UNAME: "uname -nsr"
      CAT: "cat /etc/hosts"
      HOST: "hostnamectl"
      VGS: "vgs"
      MEM: "free -h"
      SCSI: "lsscsi"
      DISC: "fdisk -l"
      LVS: "lvs"
      UPTIME: "uptime"
      UPDATE: "yum update -y"
      UPGRADE: "yum upgrade -y"
      SNMP: "snmpwalk -v2c -c private 172.30.203.16 iso.3.6.1.2.1.4.20.1.1"
      
  tasks:
    - name: Validar que el Comando exista en lista_comandos
      fail:
        msg: "EL COMANDO {{ comandos }} NO EXISTE EN lista_comandos"
      when: comandos not in lista_comandos

    - name: Ejecutando Comando Seleccionado
      command: "{{ lista_comandos[comandos] }}"
      register: salida
      when: comandos in lista_comandos

    - name: Resultado en Consola
      debug:
        var: salida.stdout_lines
      when: salida is defined

    - name: Guardar Resultados en FACT
      set_fact:
        resultados: "{{ resultados | default({}) | combine({ inventory_hostname: salida.stdout_lines }) }}"
      when: salida is defined

- hosts: "{{ HOST }}"
  gather_facts: yes

  vars:
    lista_comandos:
      UNAME: "uname -nsr"
      CAT: "cat /etc/hosts"
      HOST: "hostnamectl"
      VGS: "vgs"
      MEM: "free -h"
      SCSI: "lsscsi"
      DISC: "fdisk -l"
      LVS: "lvs"
      UPTIME: "uptime"
      UPDATE: "yum update -y"
      UPGRADE: "yum upgrade -y"
      SNMP: "snmpwalk -v2c -c private 172.30.203.16 iso.3.6.1.2.1.4.20.1.1"

  tasks:
    - name: Crear Carpeta Reportes si no existe
      file:
        path: /tmp/reportes
        state: directory
        mode: '0755'

    - name: Consolidar Resultados de los Hosts
      set_fact:
        resultados: "{{ hostvars | dict2items 
                        | selectattr('value.resultados','defined') 
                        | map(attribute='value.resultados') 
                        | list 
                        | combine }}"

    - name: Generar Reporte en HTML
      template:
        src: reportewhen.j2
        dest: "/tmp/reportes/Reporte_{{ COMANDO }}.html"

    - name: Mostrar Ruta del Reporte
      debug:
        msg: "REPORTE GENERADO EN: /tmp/reportes/Reporte_{{ COMANDO }}.html"

- name: Enviar correo vía Python (Sin depender de colecciones)
      shell: |
        python3 -c "
        import smtplib
        from email.message import EmailMessage
        import os

        # Configuración
        smtp_server = '172.22.88.6'
        smtp_port = 25
        #file_path = '/tmp/reportes/Reporte_{{ COMANDO }}.html'

        # Crear el mensaje
        msg = EmailMessage()
        msg['Subject'] = 'Reporte Ejecución Comando: {{ COMANDO }}'
        msg['From'] = 'ansible@claro.com.co'
        msg['To'] = 'gustavo.lamprea@claro.com.co'
        msg.set_content('Buen día,\n\nSe adjunta el reporte de la ejecución realizada por la automatización.\n\nSaludos,\nAutomatización Datacenter')

        # Adjuntar el archivo HTML si existe
        #if os.path.exists(file_path):
        #    with open(file_path, 'rb') as f:
        #        file_data = f.read()
        #        msg.add_attachment(
        #            file_data, 
        #            maintype='text', 
        #            subtype='html', 
        #            filename=os.path.basename(file_path)
        #        )
            
            # Enviar
            with smtplib.SMTP(smtp_server, smtp_port) as s:
                s.send_message(msg)
            print('Correo enviado exitosamente')
        else:
            print('Error: El archivo de reporte no existe')
            exit(1)
        "
      delegate_to: localhost
      run_once: true
